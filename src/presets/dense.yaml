# Dense — high population density
# 20 agents in a small world. Forced proximity and interaction.
# Watch for: governance emergence, crowding effects, rapid innovation.

initial_agent_count: 20
grid_width: 30
grid_height: 30
resource_distribution: clustered
resource_max_per_tile: 0.8
resource_regeneration_rate: 0.06
enable_innovation: true
enable_composition: true
enable_specialisation: true
enable_collective_rules: true
