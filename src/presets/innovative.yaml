# Innovative — maximise innovation potential
# All features enabled, high curiosity drive, long reflection cycles.
# Watch for: composition chains, novel structures, specialisation depth.

initial_agent_count: 12
grid_width: 40
grid_height: 40
resource_distribution: clustered
resource_max_per_tile: 0.8
resource_regeneration_rate: 0.05
agent_curiosity_decay_rate: 0.001
agent_curiosity_exploration_bonus: 0.05
agent_curiosity_discovery_bonus: 0.08
agent_curiosity_social_bonus: 0.03
agent_reflection_interval: 15
enable_innovation: true
enable_composition: true
enable_specialisation: true
enable_collective_rules: true
