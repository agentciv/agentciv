# Agent Civilisation — Default Configuration (Fishbowl)
# Every parameter here shapes the experiment. Change anything and you get
# a different civilisation. See docs/CONFIGURATION.md for what each does.

# World
grid_width: 15
grid_height: 15
resource_types: ["water", "food", "material"]
resource_distribution: "clustered"
resource_depletion_rate: 0.1
resource_regeneration_rate: 0.05
resource_cluster_count: 3
resource_cluster_radius: 5
resource_max_per_tile: 1.0
terrain_types: ["plain", "rocky", "dense"]
movement_cost:
  plain: 1
  rocky: 2
  dense: 3

# Agents
initial_agent_count: 12
agent_perception_range: 3
agent_communication_range: 2
agent_base_movement_speed: 1.0
agent_needs_depletion_rate: 0.02
agent_gather_restore: 0.3
agent_degradation_rate: 0.01
agent_recovery_rate: 0.02
agent_wellbeing_interaction_bonus: 0.05
agent_wellbeing_decay_rate: 0.005
agent_wellbeing_proximity_bonus: 0.01
# Curiosity / Novelty drive
agent_curiosity_decay_rate: 0.003
agent_curiosity_exploration_bonus: 0.03
agent_curiosity_discovery_bonus: 0.04
agent_curiosity_social_bonus: 0.02
agent_curiosity_learning_bonus: 0.01
# Relationships / Bonds
agent_bond_threshold: 10
agent_bond_social_multiplier: 2.0
agent_memory_capacity: 100
agent_memory_decay: false
agent_reflection_interval: 25

# Building / structures
agent_carry_capacity: 3
structures:
  shelter:
    requires: ["water", "material"]
    effect: "reduce_degradation"
    effect_strength: 0.5
    decay_rate: 0.001
  storage:
    requires: ["food", "material"]
    effect: "store_resources"
    capacity: 10
    decay_rate: 0.001
  marker:
    requires: ["material"]
    effect: "persistent_message"
    decay_rate: 0.002
  path:
    requires: ["material", "material"]
    effect: "reduce_movement_cost"
    effect_strength: 0.5
    decay_rate: 0.0005

# Population dynamics
new_agent_interval: 50
new_agent_spawn: "random"

# Feedback loops — solutions create problems, world responds to exploitation
enable_environmental_coevolution: true
heavy_gathering_regen_penalty: 0.5      # regen multiplier under heavy gathering pressure
crowding_depletion_multiplier: 1.5      # depletion rate when multiple agents gather same tile
structure_maintenance_cost: 0.01        # resources consumed per structure per tick for upkeep

# Open-ended evolution mechanics
enable_innovation: true                 # agents can propose novel structures via LLM
enable_composition: true                # agents can combine structures into higher-tier ones
enable_specialisation: true
specialisation_threshold: 20            # repetitions before specialisation bonus
specialisation_bonus: 0.1              # efficiency improvement per specialisation

# Collective rules — emergent governance
enable_collective_rules: true
rule_establishment_threshold: 0.6       # adoption rate to become established norm

# Environmental shifts
enable_environmental_shifts: true
shift_interval: 500
shift_severity: "moderate"

# Simulation
ticks_per_real_minute: 0  # 0 = fast mode (as fast as API allows)
max_interactions_per_tick: 3
max_concurrent_llm_calls: 10
max_steps_per_agentic_turn: 4  # ReAct loop steps per agent turn

# LLM
model_provider: "anthropic"
model_name: "claude-sonnet-4-20250514"
api_key_env_var: "AGENT_CIV_API_KEY"
llm_max_tokens: 300
llm_temperature: 0.7

# Watcher (Phase 2)
narrative_report_interval: 10
enable_milestone_reports: true

# Persistence
save_interval: 10
save_path: "./data/simulation_state"
log_path: "./data/logs"

# CLI
log_level: "INFO"
show_agent_reasoning: true
show_conversations: true
